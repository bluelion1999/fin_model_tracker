version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: finance_postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_ml"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
